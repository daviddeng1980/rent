                    <div class="lease-stats">
                        <span class="stat-item stat-pending"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">undefined</svg>未到期: ${stats.pending}</span>
                        <span class="stat-item stat-overdue" style="background:var(--danger-light);color:var(--danger);"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">undefined</svg>逾期: ${stats.overdue}</span>
                        <span class="stat-item stat-paid"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>已缴纳: ${stats.paid}</span>
                    </div>
                    ${Object.keys(leasePayments).length > 0 ? `
                        ${Object.entries(leasePayments).map(([leaseId, pmts]) => {
                            const lease = leaseMap[leaseId] || {};
                            const hasOverdue = pmts.some(p => p.current_status === 'overdue');
                            const allPaid = pmts.every(p => p.current_status === 'paid');
                            const leaseStatus = hasOverdue ? '<span class="badge badge-overdue">有逾期</span>' : allPaid ? '<span class="badge badge-paid">已结清</span>' : '<span class="badge badge-pending">进行中</span>';
                            return `
                                <div class="payment-group">
                                    <div class="payment-group-header" onclick="toggleLeasePayments(${leaseId})">
                                        <div style="display:flex;align-items:center;gap:12px;">
                                            </svg>
                                            <span style="font-weight:600;">${lease.name || '租约 #' + leaseId}</span>
                                            <span style="color:var(--gray-500);font-size:13px;">${propMap[lease.property_id] || ''}</span>
                                            <span style="color:var(--gray-400);font-size:13px;">${cycleMap[lease.payment_cycle] || '月付'}</span>
                                        </div>
                                        <div style="display:flex;align-items:center;gap:12px;">
                                            ${leaseStatus}
                                            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteLeasePayments(${leaseId});" title="删除该租约全部付款记录"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                                            </svg>
                                        </div>
                                    </div>
                                    <div class="payment-group-items" id="lease-payments-${leaseId}">
                                        <table style="font-size:13px;">
                                            <thead><tr><th>期数</th><th>到期日</th><th>覆盖周期</th><th>金额</th><th>状态</th><th>实付日期</th><th>操作</th></tr></thead>
                                            <tbody>
                                                ${pmts.map((p, idx) => {
                                                    const paymentCycle = lease.payment_cycle || 1;
                                                    const dueDate = new Date(p.due_date);
                                                    const periodStart = new Date(dueDate);
                                                    const periodEnd = new Date(dueDate);
                                                    periodEnd.setMonth(periodEnd.getMonth() + paymentCycle);
                                                    periodEnd.setDate(periodEnd.getDate() - 1);
                                                    const statusBadge = p.current_status === 'overdue' ? '<span class="badge badge-overdue">逾期</span>' : p.current_status === 'paid' ? '<span class="badge badge-paid">已缴纳</span>' : '<span class="badge badge-pending">未到期</span>';
                                                    return `<tr ${p.current_status === 'overdue' ? 'style="background:var(--danger-light);"' : ''}>
                                                        <td>第${idx + 1}期</td>
                                                        <td>${p.due_date}</td>
                                                        <td>${formatDate(periodStart)} ~ ${formatDate(periodEnd)}</td>
                                                        <td style="color:var(--success);font-weight:600;">¥${p.amount.toLocaleString()}</td>
                                                        <td>${statusBadge}</td>
                                                        <td>${p.paid_date || '-'}</td>
                                                        <td>
                                                            ${p.current_status !== 'paid' ? `<button class="btn btn-success btn-sm" onclick="markPaid(${p.id});loadPayments();"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>` : `<button class="btn btn-warning btn-sm" onclick="revertPayment(${p.id});loadPayments();"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>`}
                                                        </td>
                                                    </tr>`;
                                                }).join('')}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    ` : `
                        <div class="empty-state">
                            <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
                            <div class="empty-state-title">暂无付款记录</div>
                            <div class="empty-state-desc">租约生效后将自动生成付款计划</div>
                        </div>
                    `}
                </div>
            `;
        }

        function toggleLeasePayments(leaseId) {
            const el = document.getElementById(`lease-payments-${leaseId}`);
            const chevron = document.getElementById(`chevron-${leaseId}`);
            const isHidden = el.style.display === 'none' || !el.classList.contains('show');
            if (isHidden) {
                el.style.display = 'block';
                el.classList.add('show');
                chevron.style.transform = 'rotate(180deg)';
            } else {
                el.style.display = 'none';
                el.classList.remove('show');
                chevron.style.transform = 'rotate(0deg)';
            }
        }

        async function loadPaymentsFiltered() {
            const statusFilter = document.getElementById('paymentStatusFilter').value;
            let url = '/payments';
            if (statusFilter) url += `?status=${statusFilter}`;

            const [payments, leases, properties, tenants] = await Promise.all([
                api(url),
                api('/leases'),
                api('/properties'),
                api('/tenants')
            ]);
            const propMap = {};
            (properties || []).forEach(p => propMap[p.id] = p.name);
            const leaseMap = {};
            (leases || []).forEach(l => leaseMap[l.id] = l);

            const leasePayments = {};
            const cycleMap = {1: '月付', 3: '季付', 6: '半年付', 12: '年付'};
            (payments || []).forEach(p => {
                if (!leasePayments[p.lease_id]) {
                    leasePayments[p.lease_id] = [];
                }
                leasePayments[p.lease_id].push(p);
            });

            const stats = { pending: 0, overdue: 0, paid: 0 };
            (payments || []).forEach(p => {
                const s = p.current_status;
                if (stats[s] !== undefined) stats[s]++;
            });

            document.querySelector('.modern-card').innerHTML = `
                <div class="lease-stats">
                    <span class="stat-item stat-pending"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">undefined</svg>未到期: ${stats.pending}</span>
                    <span class="stat-item stat-overdue" style="background:var(--danger-light);color:var(--danger);"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">undefined</svg>逾期: ${stats.overdue}</span>
                    <span class="stat-item stat-paid"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>已缴纳: ${stats.paid}</span>
                </div>
                ${Object.keys(leasePayments).length > 0 ? `
                    ${Object.entries(leasePayments).map(([leaseId, pmts]) => {
                        const lease = leaseMap[leaseId] || {};
                        const hasOverdue = pmts.some(p => p.current_status === 'overdue');
                        const allPaid = pmts.every(p => p.current_status === 'paid');
                        const leaseStatus = hasOverdue ? '<span class="badge badge-overdue">有逾期</span>' : allPaid ? '<span class="badge badge-paid">已结清</span>' : '<span class="badge badge-pending">进行中</span>';
                        return `
                            <div class="payment-group">
                                <div class="payment-group-header" onclick="toggleLeasePayments(${leaseId})">
                                    <div style="display:flex;align-items:center;gap:12px;">
                                        </svg>
                                        <span style="font-weight:600;">${lease.name || '租约 #' + leaseId}</span>
                                        <span style="color:var(--gray-500);font-size:13px;">${propMap[lease.property_id] || ''}</span>
                                        <span style="color:var(--gray-400);font-size:13px;">${cycleMap[lease.payment_cycle] || '月付'}</span>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:12px;">
                                        ${leaseStatus}
                                        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteLeasePayments(${leaseId});" title="删除该租约全部付款记录"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                                        </svg>
                                    </div>
                                </div>
                                <div class="payment-group-items" id="lease-payments-${leaseId}">
                                    <table style="font-size:13px;">
                                        <thead><tr><th>期数</th><th>到期日</th><th>覆盖周期</th><th>金额</th><th>状态</th><th>实付日期</th><th>操作</th></tr></thead>
                                        <tbody>
                                            ${pmts.map((p, idx) => {
                                                const paymentCycle = lease.payment_cycle || 1;
                                                const dueDate = new Date(p.due_date);
                                                const periodStart = new Date(dueDate);
                                                const periodEnd = new Date(dueDate);
                                                periodEnd.setMonth(periodEnd.getMonth() + paymentCycle);
                                                periodEnd.setDate(periodEnd.getDate() - 1);
                                                const statusBadge = p.current_status === 'overdue' ? '<span class="badge badge-overdue">逾期</span>' : p.current_status === 'paid' ? '<span class="badge badge-paid">已缴纳</span>' : '<span class="badge badge-pending">未到期</span>';
                                                return `<tr ${p.current_status === 'overdue' ? 'style="background:var(--danger-light);"' : ''}>
                                                    <td>第${idx + 1}期</td>
                                                    <td>${p.due_date}</td>
                                                    <td>${formatDate(periodStart)} ~ ${formatDate(periodEnd)}</td>
                                                    <td style="color:var(--success);font-weight:600;">¥${p.amount.toLocaleString()}</td>
                                                    <td>${statusBadge}</td>
                                                    <td>${p.paid_date || '-'}</td>
                                                    <td>
                                                        ${p.current_status !== 'paid' ? `<button class="btn btn-success btn-sm" onclick="markPaid(${p.id});loadPaymentsFiltered();"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>` : `<button class="btn btn-warning btn-sm" onclick="revertPayment(${p.id});loadPaymentsFiltered();"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>`}
                                                    </td>
                                                </tr>`;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        `;
                    }).join('')}
                ` : `
                    <div class="empty-state">
                        <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
                        <div class="empty-state-title">暂无付款记录</div>
                        <div class="empty-state-desc">${statusFilter ? '试试其他筛选条件' : '租约生效后将自动生成付款计划'}</div>
                    </div>
                `}
            `;
        }

        async function markPaid(id) {
            const result = await api(`/payments/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'paid' })
            });
            if (result.error) return alert(result.error);
            loadPayments();
        }

        async function deletePayment(id) {
            if (!confirm('确定要删除这条付款记录吗？')) return;
            const result = await api(`/payments/${id}`, { method: 'DELETE' });
            if (result.error) return alert(result.error);
            loadPayments();
        }

        async function deleteLeasePayments(leaseId) {
            if (!confirm('确定要删除该租约的全部付款记录吗？此操作不可撤销。')) return;
            const result = await api(`/payments/lease/${leaseId}`, { method: 'DELETE' });
            if (result.error) return alert(result.error);
            loadPayments();
        }

        async function revertPayment(id) {
            if (!confirm('确定要将此付款记录修改为"未缴纳"状态吗？')) return;
            const result = await api(`/payments/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'pending' })
            });
            if (result.error) return alert(result.error);
        }

        async function loadAnalysis() {
            const [summary, properties] = await Promise.all([api('/analysis/summary'), api('/properties')]);

            const propertiesWithAnalysis = await Promise.all(
                (properties || []).map(async p => {
                    const result = await api(`/analysis/property/${p.id}`);
                    return { property: p, analysis: result };
                })
            );

            const rentedCount = summary.rented_count || 0;
            const totalProperties = summary.total_properties || 0;
            const occupancyRate = totalProperties > 0 ? Math.round((rentedCount / totalProperties) * 100) : 0;

            document.getElementById('content').innerHTML = `
                <div class="modern-card" style="margin-bottom:24px;">
                    <h3 style="margin-bottom:24px;display:flex;align-items:center;gap:8px;"></svg>总体概览</h3>
                    <div class="stats-grid">
                        <div class="stat-card primary">
                            <div class="stat-icon primary"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg></div>
                        <div class="stat-label">房产总数</div>
                            <div class="stat-value">${totalProperties}</div>
                        </div>
                        <div class="stat-card success">
                            <div class="stat-icon success"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg></div>
                        <div class="stat-label">出租率</div>
                            <div class="stat-value">${occupancyRate}%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon primary"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
                        <div class="stat-label">月租金收入</div>
                            <div class="stat-value" style="color:var(--success);">¥${(summary.income?.total_monthly_rent || 0).toLocaleString()}</div>
                        </div>
                        <div class="stat-card ${(summary.profit || 0) >= 0 ? 'success' : 'danger'}">
                            <div class="stat-icon ${(summary.profit || 0) >= 0 ? 'success' : 'danger'}"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg></div>
                        <div class="stat-label">年度利润</div>
                            <div class="stat-value" style="color:${(summary.profit || 0) >= 0 ? 'var(--success)' : 'var(--danger)'};">
                                ¥${(summary.profit || 0).toLocaleString()}
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modern-card">
                    <h3 style="margin-bottom:20px;display:flex;align-items:center;gap:8px;"></svg>各房产收益分析</h3>
                    ${propertiesWithAnalysis.length > 0 ? `
                        <table>
                            <thead><tr><th>房产</th><th>状态</th><th>月租金</th><th>年租金</th><th>年成本</th><th>年度利润</th></tr></thead>
                            <tbody>
                                ${propertiesWithAnalysis.map(({ property: p, analysis }) => {
                                    if (!analysis || analysis.error) return '';
                                    const costs = analysis.costs || {};
                                    const totalCosts = (costs.loan_cost || 0) + (costs.property_fee || 0) + (costs.opportunity_cost || 0);
                                    return `
                                        <tr>
                                            <td><strong>${p.name}</strong></td>
                                            <td><span class="badge ${p.status === '出租中' ? 'badge-rented' : 'badge-vacant'}">${p.status}</span></td>
                                            <td style="color:var(--success);font-weight:600;">¥${(analysis.income?.monthly_rent || 0).toLocaleString()}</td>
                                            <td>¥${(analysis.income?.annual_rent || 0).toLocaleString()}</td>
                                            <td style="color:var(--gray-600);">¥${totalCosts.toLocaleString()}</td>
                                            <td style="color: ${(analysis.profit || 0) >= 0 ? 'var(--success)' : 'var(--danger)'}; font-weight: 700;">
                                                ¥${(analysis.profit || 0).toLocaleString()}
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    ` : `
                        <div class="empty-state">
                            <div class="empty-state-icon"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
                            <div class="empty-state-title">暂无数据</div>
                            <div class="empty-state-desc">添加房产后即可查看收益分析</div>
                        </div>
                    `}
                </div>
            `;
        }

        function showModal(title, body) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modal').classList.add('show');
            initImageUpload();
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            pendingImages = [];
            editingPropertyId = null;
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('show');
        }

        function openLightbox(imagePath) {
            document.getElementById('lightboxImg').src = API + imagePath;
            document.getElementById('lightbox').classList.add('show');
        }

        function initImageUpload() {
            // 处理添加房产的上传区域
            const uploadArea = document.getElementById('uploadArea');
            if (uploadArea) {
                const fileInput = document.getElementById('fileInput');
                if (fileInput) {
                    uploadArea.addEventListener('click', () => fileInput.click());
                    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
                    uploadArea.addEventListener('dragleave', () => { uploadArea.classList.remove('dragover'); });
                    uploadArea.addEventListener('drop', (e) => { e.preventDefault(); uploadArea.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
                    fileInput.addEventListener('change', (e) => { handleFiles(e.target.files); });
                }
            }

            // 处理编辑房产的上传区域
            const uploadAreaEdit = document.getElementById('uploadAreaEdit');
            if (uploadAreaEdit) {
                const fileInputEdit = document.getElementById('fileInputEdit');
                if (fileInputEdit) {
                    uploadAreaEdit.addEventListener('click', () => fileInputEdit.click());
                    uploadAreaEdit.addEventListener('dragover', (e) => { e.preventDefault(); uploadAreaEdit.classList.add('dragover'); });
                    uploadAreaEdit.addEventListener('dragleave', () => { uploadAreaEdit.classList.remove('dragover'); });
                    uploadAreaEdit.addEventListener('drop', (e) => { e.preventDefault(); uploadAreaEdit.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
                    fileInputEdit.addEventListener('change', (e) => { handleFiles(e.target.files); });
                }
            }
        }

        async function handleFiles(files) {
            const maxImages = 10;
            const currentCount = pendingImages.length;
            const remaining = maxImages - currentCount;
            if (remaining <= 0) { alert('最多只能上传10张图片'); return; }

            const filesToUpload = Array.from(files).slice(0, remaining);
            for (const file of filesToUpload) {
                if (!file.type.startsWith('image/')) { alert('请上传图片文件'); continue; }
                if (file.size < 50 * 1024) { alert('图片太小，最小需要50KB'); continue; }

                const formData = new FormData();
                formData.append('file', file);
                if (editingPropertyId) formData.append('property_id', editingPropertyId);

                try {
                    const res = await fetch(API + '/upload/image', { method: 'POST', body: formData });
                    const text = await res.text();
                    let result;
                    try { result = JSON.parse(text); } catch { alert('上传失败：响应格式错误'); continue; }
                    if (result.error) { alert(result.error); continue; }
                    pendingImages.push(result);
                    renderImagePreviews();
                } catch (e) { console.error(e); alert('上传失败'); }
            }
        }

        function renderImagePreviews() {
            const container = document.getElementById('imagePreviewContainer');
            if (!container) return;
            container.innerHTML = pendingImages.map((img, index) => `
                <div class="image-preview-item">
                    <img src="${API}${img.thumbnail}" alt="预览">
                    ${index === 0 ? '<span class="cover-badge">封面</span>' : `<button class="set-cover-btn" onclick="setCover(${index})">设封面</button>`}
                    <button class="remove-btn" onclick="removeImage(${index})">&times;</button>
                </div>
            `).join('');
        }

        function setCover(index) {
            if (index === 0) return;
            const item = pendingImages.splice(index, 1)[0];
            pendingImages.unshift(item);
            renderImagePreviews();
        }

        async function removeImage(index) {
            const img = pendingImages[index];
            pendingImages.splice(index, 1);
            fetch(API + '/upload/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: img.image })
            });
            renderImagePreviews();
        }

        document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click', () => navigate(el.dataset.page)));

        // 初始化应用
        function initApp() {
            loadDashboard();
        }

        // 等待 DOM 加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
